spring.application.name=finmate_smartmoneymanagement_be

#database
spring.datasource.url=jdbc:postgresql://localhost:5432/finmate_db
spring.datasource.username=postgres
spring.datasource.password=postgres


#config
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary
cloudinary.cloud-name=root
cloudinary.api-key=${CLOUD_API_KEY}
cloudinary.api-secret=${CLOUD_API_SECRET}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

app.jwt.secret=${JWT_SECRET:finmate-super-secret-key-change-me-please-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google Sign-In
google.oauth.allowed-client-ids=${GOOGLE_ALLOWED_CLIENT_IDS}
